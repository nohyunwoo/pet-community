<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - PetsLoview</title>
    <link rel="stylesheet" href="/nav.css">
    <link rel="stylesheet" href="/board.css">
</head>
<body>
    <div th:replace="nav :: navbar"></div>

    <main>
        <div class="container">
            <div class="board-header">
                <div class="board-title">
                    <h1>자유게시판</h1>
                    <p>자유롭게 이야기를 나눠보세요</p>
                </div>
                <a href="/post" class="btn write-btn">새 글 작성</a>
            </div>

            <div class="search-filter">
                <form>
                    <div class="search-box">
                        <input name="keyword" type="text" placeholder="Let's 검색!">
                        <button type="submit">검색</button>
                    </div>
                </form>
                <select class="filter-select">
                    <option>전체</option>
                    <option>제목</option>
                    <option>내용</option>
                    <option>작성자</option>
                </select>
                <select class="filter-select">
                    <option>최신순</option>
                    <option>조회순</option>
                    <option>댓글순</option>
                </select>
            </div>

            <div class="post-list">
                <div class="post-list-header">
                    <div>제목</div>
                    <div>작성자</div>
                    <div>작성일</div>
                    <div>조회수</div>
                </div>
                <div th:if="${posts.totalElements > 0}">
                    <div th:each="post : ${posts.content}" class="post-item">
                        <div class="post-title">
                            <a th:href="@{'/post/' + ${post.id}}" th:text="${post.title}">게시글 제목</a>
                        </div>
                        <div class="post-author" th:text="${post.user.displayName}">작성자</div>
                        <div class="post-date" th:text="${@timeAgo.format(post.createdAt)}">작성일</div>
                        <div class="post-views" th:text="'👁 ' + ${post.count}">조회수</div>
                    </div>
                </div>
                <p th:if="${posts.totalElements == 0}">게시글이 없습니다.</p>

                <div class="pagination" th:if="${posts.totalPages > 1}">
                    <!-- 이전 버튼 -->
                    <button class="page-btn"
                            th:if="${!posts.first}"
                            th:onclick="'location.href=\'/board?page=' + (${posts.number} - 1) + '&size=' + ${posts.size} + '\''">
                        ‹
                    </button>

                    <!-- 페이지 번호 버튼 -->
                    <span th:each="i : ${#numbers.sequence(0, posts.totalPages-1)}">
                        <button class="page-btn"
                                th:if="${i != posts.number}"
                                th:onclick="'location.href=\'/board?page=' + ${i} + '&size=' + ${posts.size} + '\''"
                                th:text="${i + 1}">
                        </button>
                        <button class="page-btn active"
                                th:if="${i == posts.number}"
                                th:text="${i + 1}">
                        </button>
                    </span>

                    <!-- 다음 버튼 -->
                    <button class="page-btn"
                            th:if="${!posts.last}"
                            th:onclick="'location.href=\'/board?page=' + (${posts.number} + 1) + '&size=' + ${posts.size} + '\''">
                        ›
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 ComeOn. 모든 권리 보유.</p>
        </div>
    </footer>

    <script>
        // 페이지네이션
        document.querySelectorAll('.page-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.page-btn').forEach(b => b.classList.remove('active'));
                if (!isNaN(this.textContent)) {
                    this.classList.add('active');
                }
            });
        });
    </script>
</body>
</html>
